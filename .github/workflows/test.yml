name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build
      - run: npx jest --verbose
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_DATABASE: opencode_memory_test
          PG_USER: opencode
          PG_PASSWORD: test
